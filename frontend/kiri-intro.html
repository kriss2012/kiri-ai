<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiri AI Intro Animation</title>
    <style>
        body {
            margin: 0;
            background: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .logo {
            font-size: clamp(48px, 10vw, 120px);
            font-weight: 900;
            letter-spacing: 0.1em;
            background: linear-gradient(90deg, #00eaff, #7a5cff, #ff4fd8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            opacity: 0;
            transform: scale(0.5);
            animation: logoReveal 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            text-shadow: 0 0 30px rgba(122, 92, 255, 0.3);
        }

        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 234, 255, 0.15), rgba(122, 92, 255, 0.1), transparent 70%);
            filter: blur(80px);
            animation: pulse 4s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes logoReveal {
            0% {
                opacity: 0;
                transform: scale(0.5);
                filter: blur(20px);
            }
            60% {
                opacity: 1;
                transform: scale(1.05);
                filter: blur(0px);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.8); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        .tagline {
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(18px, 3vw, 28px);
            margin-top: 24px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 2s 1.5s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scanline effect for extra tech feel */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <div class="logo">KIRI AI</div>
        <div class="tagline">Next Generation Intelligence</div>
    </div>

    <script>
        // Optional: Auto-redirect or restart logic can go here
        console.log("Kiri AI Intro Loaded");
    </script>
</body>
</html>
